<!DOCTYPE html>
<html>
<head>
    <title>Simple Interest Calculator</title>
</head>
<body>
    <h2>Calculate Simple Interest</h2>
    <form action="Q43InterestServlet" method="post">
        <label>Principal:</label>
        <input type="text" name="principal" required><br><br>

        <label>Time (years):</label>
        <input type="text" name="time" required><br><br>

        <label>Rate (% per year):</label>
        <input type="text" name="rate" required><br><br>

        <input type="submit" value="Calculate">
    </form>
</body>
</html>
